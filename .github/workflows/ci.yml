name: HushForgeAndroid CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Android app
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug --stacktrace

      - name: Upload Android build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hush-forge-android-build-reports
          if-no-files-found: ignore
          path: |
            app/build/reports/
            app/build/test-results/

  mobile-harness-smoke:
    name: Mobile harness happy path
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Android app
        uses: actions/checkout@v4

      - name: Checkout FORGE wallet harness
        uses: actions/checkout@v4
        with:
          repository: Hushnetwork-social/hush-forge-wallet-harness
          path: hush-forge-wallet-harness

      - name: Checkout Neo3 private network
        uses: actions/checkout@v4
        with:
          repository: AxLabs/neo3-privatenet-docker
          path: neo3-privatenet-docker

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: hush-forge-wallet-harness/package-lock.json

      - name: Install wallet harness dependencies
        working-directory: hush-forge-wallet-harness
        run: npm ci

      - name: Start Neo3 private network
        run: docker compose up --detach
        working-directory: neo3-privatenet-docker

      - name: Wait for Neo3 RPC
        run: |
          for attempt in {1..60}; do
            if curl --silent --fail \
              --header 'Content-Type: application/json' \
              --data '{"jsonrpc":"2.0","method":"getblockcount","params":[],"id":1}' \
              http://127.0.0.1:10332/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Start local WalletConnect harness
        working-directory: hush-forge-wallet-harness
        run: |
          FORGE_WALLET_HARNESS_RPC_URL=http://127.0.0.1:10332 \
          FORGE_WALLET_HARNESS_REOWN_PROJECT_ID=forge-local-project \
          FORGE_WALLET_HARNESS_RELAY_DEBUG=true \
          npm run dev:server > ../wallet-harness.log 2>&1 &

      - name: Wait for harness pair endpoint
        run: |
          for attempt in {1..60}; do
            if curl --silent --fail http://127.0.0.1:32103/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat wallet-harness.log || true
          exit 1

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run mobile harness smoke test
        uses: reactivecircus/android-emulator-runner@v2
        env:
          FORGE_DEFAULT_RPC_URL: http://127.0.0.1:10332
          FORGE_REOWN_PROJECT_ID: forge-local-project
          FORGE_REOWN_RELAY_URL: ws://127.0.0.1:32102?projectId=forge-local-project
          FORGE_MOBILE_WALLET_HARNESS_PAIR_URL: http://127.0.0.1:32103/pair
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_5
          cores: 2
          ram-size: 3072M
          heap-size: 512M
          disk-size: 4096M
          sdcard-path-or-size: 1024M
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          disable-animations: true
          script: |
            bash -c 'set -e; mkdir -p app/build/outputs/androidTest-results/connected; adb logcat -c; adb reverse tcp:10332 tcp:10332; adb reverse tcp:32102 tcp:32102; adb reverse tcp:32103 tcp:32103; adb logcat -v time > app/build/outputs/androidTest-results/connected/logcat.txt & LOGCAT_PID=$!; set +e; ./gradlew :app:connectedDebugAndroidTest --stacktrace; TEST_STATUS=$?; kill "$LOGCAT_PID" || true; wait "$LOGCAT_PID" || true; exit "$TEST_STATUS"'

      - name: Upload mobile harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hush-forge-android-mobile-harness-artifacts
          if-no-files-found: ignore
          path: |
            wallet-harness.log
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/

      - name: Stop private network
        if: always()
        run: docker compose down --volumes --remove-orphans
        working-directory: neo3-privatenet-docker
